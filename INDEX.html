<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>COZY BROW CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --surface-2: #fffdf9;
      --line: #ece5d8;
      --line-soft: #f4ede2;
      --text: #1e1a15;
      --text-2: #4a3f32;
      --sub: #9a8d7c;
      --gold: #b8892a;
      --gold-2: #d4a843;
      --gold-soft: #fdf3de;
      --gold-border: rgba(184, 137, 42, .22);
      --nav: rgba(250, 247, 242, .96);
      --success: #1e7a3e;
      --success-bg: #eaf6ee;
      --warn: #8a5c00;
      --warn-bg: #fff8e6;
      --danger: #a03030;
      --danger-bg: #fff2f2;
      --info: #2460a0;
      --info-bg: #edf4ff;
      --shadow-sm: 0 2px 8px rgba(30, 26, 21, .06);
      --shadow: 0 6px 20px rgba(30, 26, 21, .08);
      --shadow-lg: 0 16px 40px rgba(30, 26, 21, .12);
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      padding-bottom: calc(90px + var(--safe-bottom));
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
      background: none;
    }

    body>div:first-child[style*="background-color"],
    #docs-notice {
      display: none !important;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #fffdf9 0%, #f5f0e8 100%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity .4s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      color: var(--text);
      letter-spacing: 2px;
    }

    .splash-brand em {
      color: var(--gold);
      font-style: normal;
    }

    .splash-tag {
      margin-top: 6px;
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .splash-bar {
      width: 120px;
      height: 3px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 28px;
    }

    .splash-bar::after {
      content: '';
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--gold-2), var(--gold));
      animation: splashani 1.1s ease infinite;
    }

    @keyframes splashani {
      0% {
        width: 0;
        margin-left: 0;
      }

      50% {
        width: 80%;
        margin-left: 0;
      }

      100% {
        width: 0;
        margin-left: 120px;
      }
    }

    .splash-msg {
      margin-top: 14px;
      font-size: 12px;
      color: var(--sub);
    }

    /* ── TOP BAR ── */
    header.top-bar {
      position: sticky;
      top: 0;
      z-index: 60;
      padding: calc(10px + var(--safe-top)) 18px 10px;
      background: var(--nav);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--gold-border);
    }

    .top-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: 1px;
    }

    .brand em {
      color: var(--gold);
      font-style: normal;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--sub);
      margin-top: 2px;
      letter-spacing: .5px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: nowrap;
    }

    /* [CSS FIX] .hdr-btn-icon 중복 정의 통합
     * 원인: 214~252줄에 동일 클래스명이 두 번 정의되어 첫 번째 정의가 무효화됨
     * 수정: 두 정의를 하나로 통합 */
    .hdr-btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text-2);
      font-size: 15px;
    }

    .hdr-btn {
      height: 36px;
      padding: 0 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hdr-btn-primary {
      background: var(--gold);
      color: white;
      box-shadow: 0 2px 8px rgba(184, 137, 42, .3);
    }

    .hdr-btn-ghost {
      background: var(--surface);
      color: var(--text-2);
      border: 1px solid var(--line);
    }

    /* ── SHELL ── */
    .shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 16px 8px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeUp .22s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── SECTION HEADING ── */
    .sec-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .sec-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .5px;
    }

    .sec-sub {
      font-size: 11px;
      color: var(--sub);
      margin-top: 4px;
    }

    /* ── KPI GRID ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, var(--gold-2), var(--gold));
    }

    .kpi-label {
      font-size: 11px;
      color: var(--sub);
      font-weight: 500;
      letter-spacing: .3px;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-top: 6px;
      letter-spacing: -.5px;
    }

    .kpi-meta {
      font-size: 10px;
      color: var(--sub);
      margin-top: 5px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 18px;
      margin-bottom: 14px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .card-sub {
      font-size: 11px;
      color: var(--sub);
      margin-top: 2px;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .b-ai {
      background: var(--gold-soft);
      color: var(--warn);
      border: 1px solid rgba(184, 137, 42, .2);
    }

    .b-open {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .b-done {
      background: var(--success-bg);
      color: var(--success);
    }

    .b-issue {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .b-info {
      background: var(--info-bg);
      color: var(--info);
    }

    .b-neutral {
      background: #f0ece5;
      color: var(--sub);
    }

    .b-24 {
      background: #e8f0fe;
      color: #1a4db0;
    }

    .b-25 {
      background: #fce8e6;
      color: #c5221f;
    }

    .b-26 {
      background: #e8f7ee;
      color: #1e7a3e;
    }

    /* ── BUTTONS ── */
    .btn {
      min-height: 44px;
      padding: 0 18px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all .18s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: white;
      box-shadow: 0 4px 14px rgba(184, 137, 42, .28);
    }

    .btn-primary:active {
      transform: scale(.98);
    }

    /* [FIX-H7] 저장 중 버튼 비활성화 스타일 */
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-secondary {
      background: var(--text);
      color: white;
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(160, 48, 48, .15);
    }

    .btn-sm {
      min-height: 34px;
      font-size: 12px;
      padding: 0 12px;
      border-radius: 10px;
    }

    .btn-xs {
      min-height: 28px;
      font-size: 11px;
      padding: 0 10px;
      border-radius: 8px;
    }

    .pill-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 32px;
      padding: 0 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: var(--surface-2);
      color: var(--sub);
      border: 1px solid var(--line);
      transition: all .15s;
    }

    .pill.on {
      background: var(--gold-soft);
      color: var(--gold);
      border-color: var(--gold-border);
    }

    /* ── LIST ITEMS ── */
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all .15s;
    }

    .item:active {
      transform: scale(.99);
      background: #fdfaf5;
    }

    .item-inner {
      min-width: 0;
      flex: 1;
    }

    .item-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-sub {
      margin-top: 3px;
      color: var(--sub);
      font-size: 11px;
      line-height: 1.5;
    }

    .item-right {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .item-amt {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8c96b, var(--gold));
      color: white;
      font-weight: 700;
      font-size: 15px;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── FORMS ── */
    .field,
    .select,
    .textarea {
      width: 100%;
      min-height: 46px;
      border: 1.5px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      font-size: 14px;
    }

    .field:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184, 137, 42, .1);
    }

    .textarea {
      min-height: 88px;
      resize: vertical;
    }

    .label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 6px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-block {
      margin-bottom: 12px;
    }

    .form-block:last-child {
      margin-bottom: 0;
    }

    .form-full {
      grid-column: 1/-1;
    }

    .switch-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-2);
      padding: 6px 0;
    }

    .switch-row input[type=checkbox] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
    }

    .helper {
      background: var(--gold-soft);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 12px;
      color: var(--warn);
      line-height: 1.6;
    }

    .hr {
      height: 1px;
      background: var(--line);
      margin: 14px 0;
    }

    /* ── CALENDAR ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-day-label {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--sub);
      padding: 5px 0;
      letter-spacing: .5px;
    }

    .cal-day-label:first-child {
      color: var(--danger);
    }

    .cal-day-label:last-child {
      color: var(--info);
    }

    .cal-cell {
      min-height: 52px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .cal-cell:first-child,
    .cal-cell:nth-child(7n+1) {
      color: var(--danger);
    }

    .cal-cell:nth-child(7n) {
      color: var(--info);
    }

    .cal-cell.empty {
      background: transparent;
      border: none;
      cursor: default;
    }

    .cal-cell.has-appt {
      background: #fffdf5;
      border-color: var(--gold-border);
    }

    .cal-cell.selected {
      border-color: var(--gold);
      background: var(--gold-soft);
    }

    .cal-cell.today {
      background: var(--gold);
      color: white !important;
      font-weight: 700;
      box-shadow: 0 3px 10px rgba(184, 137, 42, .35);
    }

    .dots {
      display: flex;
      gap: 2px;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
    }

    .cal-cell.today .dot {
      background: rgba(255, 255, 255, .7);
    }

    /* 이슈 고객이 있는 날 */
    .cal-cell.has-issue {
      border-color: rgba(160, 48, 48, .35);
    }
    .cal-cell.has-issue:not(.selected):not(.today) {
      background: #fff8f8;
    }
    .issue-pin {
      font-size: 8px;
      vertical-align: super;
      margin-left: 1px;
      color: var(--danger);
    }
    .cal-cell.today .issue-pin {
      color: rgba(255,255,255,.85);
    }

    /* ── BOTTOM NAV ── */
    nav.bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 70;
      background: var(--nav);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--gold-border);
      display: flex;
      justify-content: space-around;
      padding: 6px 8px calc(8px + var(--safe-bottom));
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 60px;
      padding: 6px 4px;
      border-radius: 12px;
      color: var(--sub);
      transition: all .2s;
    }

    .nav-item.active {
      color: var(--gold);
    }

    .nav-icon {
      font-size: 20px;
      line-height: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    /* ── OVERLAY / SHEET ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0, 0, 0, .35);
      backdrop-filter: blur(4px);
    }

    .sheet {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 6px 18px 0;
      max-height: 93dvh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      animation: sheetUp .24s cubic-bezier(.34, 1.56, .64, 1);
    }
    /* [BUG3 FIX] 시트 본문이 footer에 가려지지 않도록 스크롤 가능 영역 확보 */
    #sheetBody {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 calc(8px + var(--safe-bottom));
    }

    @keyframes sheetUp {
      from {
        transform: translateY(30px);
        opacity: .6;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-handle {
      width: 44px;
      height: 5px;
      background: var(--line);
      border-radius: 999px;
      margin: 12px auto 16px;
    }

    .sheet-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .sheet-sub {
      font-size: 12px;
      color: var(--sub);
      margin-top: 4px;
      line-height: 1.5;
    }

    .sheet-footer {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      padding: 14px 0 calc(18px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      position: sticky;
      bottom: 0;
      background: var(--surface);
      z-index: 2;
    }

    .sheet-footer>.btn {
      flex: 1;
    }

    /* ── DETAIL GRID ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .detail-box {
      background: var(--surface-2);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .detail-box.full {
      grid-column: 1/-1;
    }

    .detail-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--sub);
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .detail-value {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
      color: var(--text);
    }

    /* ── SERVICE CHIPS ── */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .service-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      /* [FIX-UI] 터치 최소 높이 44px 보장 (iOS HIG 권장) */
      padding: 11px 13px;
      min-height: 44px;
      background: var(--surface-2);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }

    .service-chip:has(input:checked) {
      border-color: var(--gold);
      background: var(--gold-soft);
    }

      width: 15px;
      height: 15px;
      accent-color: var(--gold);

      color: var(--sub);
      font-size: 11px;

      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      overflow: hidden;
    }

      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
    }

      padding: 0 16px 14px;
      display: none;
    }

    .cust-card-body.open {
      display: block;
    }

      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .visit-history {
      background: var(--surface-2);
      border-radius: 12px;
      border: 1px solid var(--line-soft);
      padding: 10px 12px;
      margin-top: 10px;
    }

    .visit-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 12px;
    }

    .visit-row:last-child {
      border-bottom: none;
    }

    /* ── CHART MULTI-YEAR ── */
    .chart-legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--sub);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(96px + var(--safe-bottom));
      z-index: 500;
      background: rgba(15, 12, 8, .88);
      color: #fff;
      padding: 11px 18px;
      border-radius: 999px;
      font-size: 13px;
      display: none;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--sub);
      font-size: 13px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: .5;
    }

    /* ── YEAR DROPDOWN ── */
    .year-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--sub);
      cursor: pointer;
      padding: 6px 12px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .year-toggle:hover {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .past-customers {
      margin-top: 8px;
    }

    .pay-row {

    }

      background: #f3ece0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 5px;
    }

    }

    @media(max-width:680px) {

    @media(min-width:681px) and (max-width:1024px) {

  <script>
    /*════════════════════════════════════
     *  COZY BROW CRM v5.1
     *  index.html  — GAS 웹앱 전용 빌드
     *
     *  수정 이력 v5.1:
     *  [FIX-H1] syncServiceSelection: total=0일 때 빈 문자열이 되어 저장 불가 수정
     *  [FIX-H2] saveAppt: 예약일 유효성 검사 추가
     *  [FIX-H3] openSheet('cust'): 방문일 기본값 오늘 날짜로 설정
     *  [FIX-H4] openComplete: 환불 금액 필드 추가 + 신규고객 완료 버튼 disabled
     *  [FIX-H5] openSaleEdit: 시술항목 select 추가 (GAS api_updateSale 이미 지원)
     *  [FIX-H6] saveComplete/saveCompleteAndRegister: 환불 필드 연동
     *  [FIX-H7] saveSaleEdit: 시술항목 필드 연동
     *  [FIX-H8] drawSalesChart: 추정 데이터 이중 dataset 렌더링 버그 수정
     *  [FIX-H9] 모든 save 함수: _saving 플래그로 중복 제출 방지
     *════════════════════════════════════*/
    let db = { CUSTOMER: [], APPT: [], SALES: [], EXPENSE: [], CATALOG: [], ACCOUNTS: [], today: '', monthKey: '' };
    let salesChart = null, apptForecastChart = null, expChart = null;
    let currentView = 'home';
    let calCursor = new Date();
    let selectedDate = '';
    let salesCalCursor = new Date();
    let selectedSalesDate = '';
    let custFilter = 'all', custSort = 'name';
    let pastCustVisible = false;

    /* [FIX-H9] 중복 제출 방지 플래그
     * 원인: save 함수에 중복 실행 방지 로직 없음
     * 증상: 빠르게 두 번 클릭 시 서버에 요청 두 번 전송 → 데이터 중복 생성
     * 수정: _saving 플래그로 저장 중 재실행 차단 */
    let _saving = false;
    function _withSave(fn) {
      if (_saving) { toast('처리 중입니다. 잠시 기다려주세요.'); return; }
      _saving = true;
      /* done() 호출 시 플래그 해제 — 성공/실패 모두에서 반드시 호출해야 함 */
      fn(function done() { _saving = false; });
    }

    const WD = ['일', '월', '화', '수', '목', '금', '토'];
    const YEAR_COLORS = { '23': '#9b9b9b', '24': '#4a90e2', '25': '#e87040', '26': '#2cb67d' };

        if (!Array.isArray(o[k])) o[k] = [];
      });
      o.today = normalizeDate(o.today || todayISO());
      o.monthKey = o.monthKey || o.today.slice(0, 7);
      return o;
    }

    /* ──────────────── 부분 새로고침 (저장 후 화면 유지) ──────────────── */
    function refreshFromServer(onDone) {
      callServer('api_getInitialData', undefined, function(res) {
        db = normalizeData(res);
        document.getElementById('headerDate').textContent = compactDisplay(db.today) + ' 기준';
        if (!selectedDate) selectedDate = db.today;
        if (typeof onDone === 'function') onDone();
        renderAll();
      }, function(e) { console.warn('부분 새로고침 실패, 로컬 렌더만 수행', e); renderAll(); });
    }
    function boot() {
      showSplash('최신 데이터를 불러오는 중...');
      clearTimeout(window.__bootTimer);
      window.__bootTimer = setTimeout(() => {
        hideSplash();
        alert('로딩이 지연되고 있습니다. 네트워크 또는 시트 연결을 확인해주세요.');
      }, 20000);

      callServer('api_getInitialData', undefined, function (res) {
        clearTimeout(window.__bootTimer);
        try {
          db = normalizeData(res);
          document.getElementById('headerDate').textContent = compactDisplay(db.today) + ' 기준';
          if (!selectedDate) selectedDate = db.today;
          /* 매출 월력 초기화 */
          if (db.today) { const td = new Date(db.today + 'T00:00:00'); salesCalCursor = new Date(td.getFullYear(), td.getMonth(), 1); }
          hideSplash();
          renderAll();
        } catch (e) { console.error(e); hideSplash(); alert('렌더링 오류: ' + err2str(e)); }
      }, function (e) { clearTimeout(window.__bootTimer); hideSplash(); alert('로딩 실패: ' + err2str(e)); });
    }

    function renderAll() { renderDash(); renderAppt(); renderCust(); renderSales(); renderExp(); go(currentView); }

    /* ──────────────── Navigation ──────────────── */
    function go(view) {
      currentView = view;
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
    }

    /* ──────────────── Lookup helpers ──────────────── */
    function getCustById(id) { return (db.CUSTOMER || []).find(c => String(c.고객ID || '') === String(id || '')); }
    function getCustName(id) { const c = getCustById(id); return c ? (c.성함 || id) : (id || '-'); }
    function getApptName(a) { return a.성함 || getCustName(a.고객ID); }

    function getServiceRows() { return (db.CATALOG || []).filter(r => String(r.시술항목 || '').trim()); }
    /* [BUG2 FIX] CB_카탈로그의 실제 헤더는 '기본금액' — 누락 추가 */
    function getServicePrice(r) { return Number(r.기본금액 || r.금액 || r.단가 || r.판매가 || r.예상금액 || r.기준금액 || 0) || 0; }

    /* 고객의 방문 연도 Set 반환 (SALES 기록 기반)
     * compact 6자리(YYMMDD)나 정확히 yyyy-MM-dd 10자리만 신뢰 */
    function getCustYears(custId) {
      const yrs = new Set();
      const id = String(custId || '');
      (db.SALES || []).forEach(s => {
        if (String(s.고객ID || '') !== id) return;
        const raw = String(s.일자 || '').trim();
        if (/^\d{6}$/.test(raw) || /^\d{4}-\d{2}-\d{2}$/.test(raw)) {
          const dt = normalizeDate(raw);
          if (dt) yrs.add(dt.slice(2, 4));
        }
      });
      return yrs;
    }

    /* 이번 연도: db.today 기준 */
    function thisYear() { return (db.today || todayISO()).slice(2, 4); }

    /* ──────────────── Service HTML ──────────────── */
    function getServiceOptionsHtml(name, selected) {
      const chosen = Array.isArray(selected) ? selected : [];
      const rows = getServiceRows();
      if (!rows.length) return '<div class="helper">카탈로그 시트에 시술항목 헤더를 추가해주세요.</div>';
      const items = rows.map(r => {
        const svc = String(r.시술항목 || '').trim();
        const price = getServicePrice(r);
        const checked = chosen.includes(svc) ? 'checked' : '';
        return `<label class="service-chip"><input type="checkbox" name="${esc(name)}" value="${esc(svc)}" data-price="${price}" ${checked} onchange="syncServiceSelection('${esc(name)}')"><span>${esc(svc)}</span><span class="svc-price">${price ? money(price) : ''}</span></label>`;
      }).join('');
      return `<div class="service-grid">${items}</div>`;
    }

    function getServiceSelectHtml(blank) {
      const rows = getServiceRows();
      const b = blank ? '<option value="">시술 선택</option>' : '';
      return b + rows.map(r => `<option value="${esc(r.시술항목)}">${esc(r.시술항목)}</option>`).join('');
    }

    function getAccountOptionsHtml() {
      if (!(db.ACCOUNTS || []).length) return '<option value="기타">기타</option>';
      return (db.ACCOUNTS || []).map(a => { const l = a.계정과목 || a.항목 || '기타'; return `<option value="${esc(l)}">${esc(l)}</option>`; }).join('');
    }

    /* [FIX-H1] syncServiceSelection: 0원 시술 저장 불가 버그 수정
     * 원인: total=0일 때 `0 || ''` = '' (빈 문자열)
     * 증상: saveSale()의 !p.paid 검사에서 빈 문자열이 true → "금액은 필수" alert → 저장 불가
     * 수정: String(total) 사용 → total=0이면 '0'이 되어 필수 검사 통과 */
    function syncServiceSelection(name) {
      const inputs = [...document.querySelectorAll(`input[name="${name}"]`)];
      const sel = inputs.filter(i => i.checked);
      const total = sel.reduce((s, i) => s + Number(i.dataset.price || 0), 0);
      const summary = document.getElementById('saleServiceSummary');
      if (summary) {
        summary.textContent = sel.length
          ? sel.map(i => i.value).join(', ') + ' → ' + money(total)
          : '선택된 시술이 없습니다.';
      }
      const amtEl = document.getElementById('fSaleAmt');
      const manual = document.getElementById('fSaleManualCheck');
      /* [FIX-H1] total || '' → String(total)
       * 0원짜리 시술도 정상 저장되도록 '0' 문자열로 설정 */
      if (amtEl && (!manual || !manual.checked)) amtEl.value = String(total);
    }

    /* ──────────────── Dashboard ──────────────── */
    function renderDash() {
      const today = normalizeDate(db.today);
      const todayAppts = (db.APPT || []).filter(a => getApptDate(a) === today).sort((a, b) => String(a.예약시간 || '').localeCompare(String(b.예약시간 || '')));
      const todaySales = (db.SALES || []).filter(s => normalizeDate(s.일자) === today).reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
      const monthSales = (db.SALES || []).filter(s => normalizeDate(s.일자).startsWith(db.monthKey)).reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
      const monthExp = (db.EXPENSE || []).filter(e => normalizeDate(e.일자).startsWith(db.monthKey)).reduce((s, r) => s + Number(r.금액 || 0), 0);

      document.getElementById('kpiTodayAppt').textContent = todayAppts.length + '건';
      document.getElementById('kpiTodaySales').textContent = money(todaySales);
      document.getElementById('kpiMonthSales').textContent = money(monthSales);
      document.getElementById('kpiProfit').textContent = money(monthSales - monthExp);
      document.getElementById('todayApptMeta').textContent = `총 ${todayAppts.length}건 예약시간 순 정렬`;

      document.getElementById('todayApptList').innerHTML = todayAppts.length
        ? todayAppts.map(a => {
          const bc = String(a.상태 || '') === '완료' ? 'b-done' : 'b-open';
          return `<div class="item" onclick="openComplete('${esc(a.예약ID || '')}')"><div class="avatar">${esc(initials(getApptName(a)))}</div><div class="item-inner"><div class="item-title">${esc(a.예약시간 || '-')} · ${esc(getApptName(a))}</div><div class="item-sub">${esc(a.시술항목 || '상담')}</div></div><div class="item-right"><span class="badge ${bc}">${esc(a.상태 || '예약')}</span><button class="btn btn-ghost btn-xs" style="margin-top:4px;" onclick="event.stopPropagation();openApptEdit('${esc(a.예약ID || '')}')">✏️</button></div></div>`;
        }).join('')
        : '<div class="empty-state"><div class="empty-icon">📅</div>오늘 예약이 없습니다.</div>';

      drawSalesChart();
      drawEstInsight();
      drawApptForecast();
    }

    /* ── 추정 인사이트 카드 ── */
    function drawEstInsight() {
      const el = document.getElementById('estInsightCard');
      if (!el) return;

      const totals = {};
      Object.entries(EST_MAP).forEach(([k, v]) => {
        const yy = k.slice(2, 4);
        totals[yy] = (totals[yy] || 0) + v;
      });

      const realTotals = {};
      (db.SALES || []).forEach(r => {
        const iso = normalizeDate(r.일자);
        if (!iso) return;
        const yy = iso.slice(2, 4);
        realTotals[yy] = (realTotals[yy] || 0) + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0);
      });

      const years = ['23', '24', '25', '26'];
      const yearLabels = { '23': '2023', '24': '2024', '25': '2025', '26': '2026' };
      const colors = YEAR_COLORS;

      let rows = '';
      years.forEach(yy => {
        const est = totals[yy] || 0;
        const real = realTotals[yy] || 0;
        if (!est && !real) return;
        const maxVal = Math.max(...years.map(y => Math.max(totals[y] || 0, realTotals[y] || 0)), 1);
        const estPct = Math.round((est / maxVal) * 100);
        const realPct = Math.round((real / maxVal) * 100);
        const color = colors[yy] || '#aaa';
        const diffTxt = real > 0 && est > 0 ?
          (real >= est
            ? `<span style="color:#2cb67d;font-size:10px;">✓ 실적 달성</span>`
            : `<span style="color:#e87040;font-size:10px;">추정 대비 ${Math.round((1 - real / est) * 100)}% 미달</span>`)
          : '';
        rows += `
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
            <span style="font-size:12px;font-weight:600;color:${color}">${yearLabels[yy]}년</span>
            <span style="font-size:10px;color:#9b917f;">${diffTxt}</span>
          </div>
          ${real > 0 ? `
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span style="width:28px;font-size:9px;color:#9b917f;text-align:right;flex-shrink:0;">실적</span>
            <div style="flex:1;height:8px;background:#f0ebe2;border-radius:4px;overflow:hidden;">
              <div style="width:${realPct}%;height:100%;background:${color};border-radius:4px;transition:width .5s;"></div>
            </div>
            <span style="width:64px;font-size:10px;color:#4a4035;text-align:right;flex-shrink:0;">${(real / 10000).toFixed(0)}만원</span>
          </div>`: ''}
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="width:28px;font-size:9px;color:#9b917f;text-align:right;flex-shrink:0;">추정</span>
            <div style="flex:1;height:8px;background:#f0ebe2;border-radius:4px;overflow:hidden;">
              <div style="width:${estPct}%;height:100%;background:${color};opacity:0.35;border-radius:4px;transition:width .5s;"></div>
            </div>
            <span style="width:64px;font-size:10px;color:#9b917f;text-align:right;flex-shrink:0;">${(est / 10000).toFixed(0)}만원 (추정)</span>
          </div>
        </div>`;
      });

      const g24 = totals['24'] || 0, g25 = totals['25'] || 0;
      /* [FIX-BUG-10] 레이블 오류 수정
       * 원인: "고객수 기준 추정"으로 표시 — 실제론 고객 시트 시술가 기반 추정 매출 증감
       * 수정: "추정 매출 기준"으로 변경 */
      const growthTxt = g24 > 0 ? `24→25년 추정 매출 기준: <strong style="color:${g25 >= g24 ? '#2cb67d' : '#e87040'}">${g25 >= g24 ? '▲' : '▼'} ${Math.abs(Math.round((g25 - g24) / g24 * 100))}%</strong>` : '';

      el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div>
          <div class="card-title">연간 매출 추이 요약</div>
          <div class="card-sub" style="margin-top:2px;">${growthTxt}</div>
        </div>
        <span style="font-size:9px;padding:3px 8px;background:#fdf3de;color:#a07830;border-radius:12px;font-weight:600;">고객시트 추정</span>
      </div>
      ${rows}
      <div style="font-size:10px;color:#b5a892;margin-top:4px;padding-top:8px;border-top:1px solid #f0ebe2;">
        ※ 추정은 고객 등록 시술항목 기준 · 남성 +₩20,000 반영 · 실제와 다를 수 있음
      </div>
    `;
    }

    /* ── 연도별 매출 꺾은 선 차트 (실적 + 추정 오버레이) ──
     * [FIX-H8] 추정 데이터 이중 dataset 렌더링 버그 수정
     * 원인: hasEst && !hasReal 조건의 연도에서
     *   1) blendData(= estData)로 dataset 추가 (blendHas = true이므로)
     *   2) 이어서 !hasReal 조건으로 estData dataset을 한 번 더 추가
     *   → 동일한 점선이 두 개 겹쳐 그려짐
     * 수정: hasReal 여부로 분기 처리
     *   - hasReal && hasEst: 실적 없는 월에만 추정 보완(blendData)
     *   - !hasReal && hasEst: 추정 전체를 한 번만 추가 */
    function drawSalesChart() {
      destroyChart(salesChart);
      if (!chartReady('salesChart')) return;

      const years = ['23', '24', '25', '26'];
      const months = Array.from({ length: 12 }, (_, i) => pad(i + 1));
      const datasets = [];
      const legendEl = document.getElementById('salesChartLegend');
      legendEl.innerHTML = '';

      years.forEach(yy => {
        const fullYear = '20' + yy;
        const color = YEAR_COLORS[yy] || '#999';

        /* 실적 데이터 (스프레드시트 매출 시트) */
        const realData = months.map(mm => {
          const key = `${fullYear}-${mm}`;
          const v = (db.SALES || []).filter(s => normalizeDate(s.일자).startsWith(key)).reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
          return v > 0 ? v : null;
        });
        const hasReal = realData.some(v => v != null);

        /* 추정 데이터 (고객 시트 기반) */
        const estData = months.map(mm => {
          const key = `${fullYear}-${mm}`;
          return EST_MAP[key] || null;
        });
        const hasEst = estData.some(v => v != null);

        if (!hasReal && !hasEst) return;

        /* 실적 라인 (실선) */
        if (hasReal) {
          datasets.push({
            label: `${fullYear}년 실적`,
            data: realData,
            borderColor: color,
            backgroundColor: color + '18',
            borderWidth: 2.5, tension: 0.35, fill: false,
            pointRadius: 3.5, pointBackgroundColor: '#fff',
            pointBorderColor: color, pointBorderWidth: 2,
            spanGaps: false
          });
          legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${fullYear}년</div>`;
        }

        /* [FIX-H8] 추정 라인 분기 처리 — 이중 추가 방지 */
        if (hasEst) {
          if (hasReal) {
            /* 실적이 있는 연도: 실적 없는 월에만 추정으로 보완 */
            const blendData = months.map((_, i) => realData[i] != null ? null : estData[i]);
            const blendHas = blendData.some(v => v != null);
            if (blendHas) {
              datasets.push({
                label: `${fullYear}년 추정`,
                data: blendData,
                borderColor: color,
                borderDash: [5, 4],
                borderWidth: 1.8, tension: 0.35, fill: false,
                pointRadius: 2.5, pointBackgroundColor: '#fff',
                pointBorderColor: color, pointBorderWidth: 1.5,
                backgroundColor: 'transparent',
                spanGaps: false
              });
            }
          } else {
            /* 실적이 전혀 없는 연도: 추정 전체를 한 번만 추가 (기존 코드는 여기서 두 번 추가됐음) */
            datasets.push({
              label: `${fullYear}년 추정`,
              data: estData,
              borderColor: color,
              borderDash: [5, 4],
              borderWidth: 1.8, tension: 0.35, fill: false,
              pointRadius: 2.5, pointBackgroundColor: '#fff',
              pointBorderColor: color, pointBorderWidth: 1.5,
              backgroundColor: 'transparent',
              spanGaps: false
            });
            legendEl.innerHTML += `<div class="legend-item" style="opacity:.7"><div class="legend-dot" style="background:${color};border:2px dashed ${color};background:transparent;width:18px;height:2px;border-radius:0;margin-top:5px"></div>${fullYear}년 추정</div>`;
          }
        }
      });

      const estNote = document.getElementById('salesEstNote');
      if (estNote) estNote.style.display = 'flex';

      salesChart = new Chart(document.getElementById('salesChart'), {
        type: 'line',
        data: { labels: months.map(m => m + '월'), datasets },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const lbl = ctx.dataset.label || '';
                  const val = ctx.parsed.y;
                  if (val == null) return null;
                  return `${lbl}: ${val.toLocaleString()}원`;
                }
              }
            }
          },
          scales: {
            y: {
              display: true,
              grid: { color: 'rgba(0,0,0,.04)' },
              ticks: { color: '#9b917f', font: { size: 10 }, callback: v => v >= 10000 ? (v / 10000).toFixed(0) + '만' : '' },
              border: { display: false }
            },
            x: { grid: { display: false }, border: { display: false }, ticks: { color: '#9b917f', font: { size: 10 } } }
          }
        }
      });
    }

    /* ── AI 예측 ── */
    function drawApptForecast() {
      /* [FIX-CRITICAL-5] 트리플 카운팅 제거
       * 원인: APPT(예약일) + SALES(매출일) + CUSTOMER(방문일+리터치일) 모두에서 날짜를 카운트
       *       완료된 예약 1건이 APPT, SALES, CUSTOMER 방문일 3곳 모두에 동일 날짜로 기록됨
       * 증상: 실제 예약 건수 대비 2~3배 과대 계산 → AI 예측 수치가 현실과 완전히 다름
       * 수정: APPT 시트의 예약일자만 카운트 (예약 건수 기준이 가장 신뢰성 높음)
       *       취소된 예약 제외하려면 상태 필터 추가 */
      const counts = {};
      function addCount(date) {
        const iso = normalizeDate(date);
        if (!iso) return;
        const k = iso.slice(0, 7);
        counts[k] = (counts[k] || 0) + 1;
      }
      /* 예약 데이터만 카운트 — 취소/노쇼 제외 */
      (db.APPT || []).forEach(r => {
        const status = String(r.상태 || '');
        if (status === '취소' || status === '노쇼') return;
        addCount(r.예약일자 || r.예약일);
      });

      const base = new Date((db.today || todayISO()) + 'T00:00:00');
      const histLabels = [], histVals = [];
      for (let i = 8; i >= 0; i--) {
        const d = new Date(base.getFullYear(), base.getMonth() - i, 1);
        const k = d.getFullYear() + '-' + pad(d.getMonth() + 1);
        histLabels.push(String(d.getFullYear()).slice(2) + '-' + pad(d.getMonth() + 1));
        histVals.push(counts[k] || 0);
      }

      const n = histVals.length;
      const xm = (n - 1) / 2, ym = histVals.reduce((a, b) => a + b, 0) / (n || 1);
      let num = 0, den = 0;
      histVals.forEach((y, x) => { num += (x - xm) * (y - ym); den += (x - xm) * (x - xm); });
      const slope = den ? num / den : 0, intercept = ym - slope * xm;
      const recentAvg = histVals.slice(-3).reduce((a, b) => a + b, 0) / (Math.min(3, n) || 1) || 1;
      const season = histVals.map(v => recentAvg ? v / recentAvg : 1);

      const predLabels = [], predVals = [];
      for (let p = 1; p <= 3; p++) {
        const d = new Date(base.getFullYear(), base.getMonth() + p, 1);
        predLabels.push(d.getMonth() + 1 + '월');
        const raw = (intercept + slope * (n - 1 + p)) * (season[(n - 1 + p) % n] || 1);
        predVals.push(Math.max(1, Math.round(raw)));
      }

      const next = predVals[0] || 0, last = histVals[n - 1] || 0;
      const pct = last ? Math.round(((next - last) / last) * 100) : 0;
      const peakMonth = predLabels[predVals.indexOf(Math.max(...predVals))] || '-';

      document.getElementById('forecastInsight').innerHTML = `
      과거 예약·매출·고객 방문을 종합 분석한 결과, 다음 달 예상 예약은 <strong>${next}건</strong>입니다.
      전월 대비 <strong style="color:${pct >= 0 ? 'var(--success)' : 'var(--danger)'}">${pct >= 0 ? '▲' : '▼'} ${Math.abs(pct)}%</strong>로 전망되며,
      향후 3개월 중 <strong>${peakMonth}</strong>의 고객 유입이 가장 높을 것으로 예측됩니다.
    `;

      destroyChart(apptForecastChart);
      if (!chartReady('apptForecastChart')) return;
      apptForecastChart = new Chart(document.getElementById('apptForecastChart'), {
        type: 'line',
        data: {
          labels: [...histLabels, ...predLabels],
          datasets: [
            { label: '실적', data: [...histVals, null, null, null], borderColor: '#b8892a', backgroundColor: 'rgba(184,137,42,.07)', borderWidth: 2.5, tension: 0.35, fill: true, pointRadius: 3, pointBackgroundColor: '#fff', pointBorderColor: '#b8892a', pointBorderWidth: 2 },
            { label: '예측', data: [...new Array(n - 1).fill(null), histVals[n - 1], ...predVals], borderColor: '#7a9ccc', borderDash: [6, 4], borderWidth: 2, tension: 0.35, pointRadius: 4, pointBackgroundColor: '#fff', pointBorderColor: '#7a9ccc', pointBorderWidth: 2 }
          ]
        },
        options: {
          plugins: { legend: { position: 'bottom', labels: { color: '#8c8374', boxWidth: 10, font: { size: 10 } } } },
          scales: {
            y: { grid: { color: 'rgba(0,0,0,.04)' }, ticks: { color: '#9b917f', font: { size: 10 } }, border: { display: false } },
            x: { grid: { display: false }, ticks: { color: '#9b917f', font: { size: 10 } }, border: { display: false } }
          }
        }
      });
    }

    /* ──────────────── Appointments ──────────────── */
    function renderAppt() {
      const y = calCursor.getFullYear(), m = calCursor.getMonth();
      document.getElementById('calTitle').textContent = `${y}년 ${m + 1}월`;

      const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m + 1, 0).getDate();
      let html = WD.map(d => `<div class="cal-day-label">${d}</div>`).join('');
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

      for (let d = 1; d <= lastDate; d++) {
        const iso = y + '-' + pad(m + 1) + '-' + pad(d);
        const dayAppts = (db.APPT || []).filter(a => getApptDate(a) === iso);
        const count = dayAppts.length;
        const hasIssue = dayAppts.some(a => {
          const c = getCustById(a.고객ID);
          return c && custHasIssue(c);
        });
        let cls = 'cal-cell';
        if (count > 0) cls += ' has-appt';
        if (iso === selectedDate) cls += ' selected';
        if (iso === db.today) cls += ' today';
        if (hasIssue) cls += ' has-issue';
        const dots = new Array(Math.min(count, 3)).fill('<span class="dot"></span>').join('');
        const issuePin = hasIssue ? '<span class="issue-pin">⚠</span>' : '';
        html += `<button class="${cls}" onclick="selectDate('${iso}')"><div>${d}${issuePin}</div><div class="dots">${dots}</div></button>`;
      }
      document.getElementById('calendar').innerHTML = html;

      const rows = (db.APPT || []).filter(a => getApptDate(a) === selectedDate).sort((a, b) => String(a.예약시간 || '').localeCompare(String(b.예약시간 || '')));
      const totalCnt = rows.length;
      const issueCnt = rows.filter(a => { const c = getCustById(a.고객ID); return c && custHasIssue(c); }).length;
      let selectedLabel = '날짜를 선택하세요';
      if (selectedDate) {
        const sd = new Date(selectedDate + 'T00:00:00');
        const yy = String(sd.getFullYear()).slice(2);
        const mm = pad(sd.getMonth() + 1);
        const dd = pad(sd.getDate());
        const wdStr = WD[sd.getDay()];
        const cntStr = totalCnt ? ` · ${totalCnt}건` : ' · 예약 없음';
        const issueStr = issueCnt > 0 ? ` ⚠ 이슈${issueCnt}명` : '';
        selectedLabel = `${yy}-${mm}-${dd}(${wdStr})${cntStr}${issueStr}`;
      }
      const labelEl = document.getElementById('selectedDateLabel');
      if (labelEl) labelEl.textContent = selectedLabel;

      document.getElementById('dayApptList').innerHTML = rows.length
        ? rows.map(a => {
          const bc = String(a.상태 || '') === '완료' ? 'b-done' : 'b-open';
          const cust = getCustById(a.고객ID);
          const hasIssue = cust && custHasIssue(cust);
          const consentOk = cust ? custConsent(cust) : true;
          const issueFlag = cust ? custIssueFlag(cust) : false;
          const issueBadges = [
            !consentOk ? '<span class="badge b-issue" style="font-size:9px;">미동의</span>' : '',
            issueFlag  ? '<span class="badge b-issue" style="font-size:9px;">이슈</span>' : ''
          ].filter(Boolean).join(' ');
          return `
          <div class="item" onclick="openComplete('${esc(a.예약ID || '')}')">
            <div class="avatar" style="${hasIssue ? 'background:var(--danger-bg);color:var(--danger);' : ''}">${esc(initials(getApptName(a)))}</div>
            <div class="item-inner">
              <div class="item-title">${esc(a.예약시간 || '-')} · ${esc(getApptName(a))} ${issueBadges}</div>
              <div class="item-sub">${esc(a.시술항목 || '상담')} · 예상 ${money(a.예상매출 || a.예상금액 || 0)}</div>
            </div>
            <div class="item-right">
              <span class="badge ${bc}">${esc(a.상태 || '예약')}</span>
              <button class="btn btn-ghost btn-xs" style="margin-top:4px;" onclick="event.stopPropagation();openApptEdit('${esc(a.예약ID || '')}')">✏️ 날짜수정</button>
            </div>
          </div>`;
        }).join('')
        : '<div class="empty-state"><div class="empty-icon">📋</div>선택일 예약이 없습니다.</div>';
    }

    function selectDate(iso) { selectedDate = iso; renderAppt(); }
    /* setMonth() 대신 new Date(y, m+delta, 1) 사용 — 31일→다음달 날짜 밀림 방지 */
    function changeMonth(delta) {
      const y = calCursor.getFullYear(), m = calCursor.getMonth();
      calCursor = new Date(y, m + delta, 1);
      renderAppt();
    }

    /* ──────────────── Customers ──────────────── */
    function custConsent(c) { return String(c.동의서동의 || c.동의여부 || c.동의서 || '').toUpperCase() === 'Y'; }
    function custIssueFlag(c) { return String(c.시술이슈체크 || c.시술이슈 || c.이슈여부 || '').toUpperCase() === 'Y'; }
    function custHasIssue(c) { return !custConsent(c) || custIssueFlag(c); }

    function setCustFilter(v) {
      custFilter = v;
      document.getElementById('filter-all').classList.toggle('on', v === 'all');
      document.getElementById('filter-issue').classList.toggle('on', v === 'issue');
      renderCust();
    }
    function setCustSort(v) {
      custSort = v;
      ['name', 'recent', 'count'].forEach(k => document.getElementById('sort-' + k).classList.toggle('on', v === k));
      renderCust();
    }
    function togglePastCustomers() {
      pastCustVisible = !pastCustVisible;
      document.getElementById('custListPast').style.display = pastCustVisible ? 'block' : 'none';
      document.getElementById('togglePastBtn').querySelector('span:first-child').textContent =
        pastCustVisible ? '📂 이전 연도 고객 숨기기' : '📂 이전 연도 고객 보기';
    }

    function renderCust() {
      const q = String(document.getElementById('custSearch').value || '').trim().toLowerCase();
      const curYY = thisYear();

      const visitMap = {};
      (db.SALES || []).forEach(s => {
        const k = String(s.고객ID || '');
        visitMap[k] = visitMap[k] || { count: 0, last: '', sum: 0 };
        visitMap[k].count += 1;
        visitMap[k].sum += Number(s.실결제금액 || 0) - Number(s.환불금액 || 0);
        const d = normalizeDate(s.일자);
        if (d && (!visitMap[k].last || d > visitMap[k].last)) visitMap[k].last = d;
      });
      (db.CUSTOMER || []).forEach(c => {
        const k = String(c.고객ID || '');
        visitMap[k] = visitMap[k] || { count: 0, last: '', sum: 0 };
        const d = normalizeDate(c.방문일 || c.예약일);
        if (d && (!visitMap[k].last || d > visitMap[k].last)) visitMap[k].last = d;
      });

      let rows = (db.CUSTOMER || []).filter(c => {
        const match = !q || String(c.성함 || '').toLowerCase().includes(q) || String(c.연락처 || '').includes(q);
        if (!match) return false;
        if (custFilter === 'issue') return custHasIssue(c);
        return true;
      });

      rows = rows.sort((a, b) => {
        const va = visitMap[String(a.고객ID || '')] || { count: 0, last: '' };
        const vb = visitMap[String(b.고객ID || '')] || { count: 0, last: '' };
        if (custSort === 'recent') return String(vb.last || '').localeCompare(String(va.last || ''));
        if (custSort === 'count') return (vb.count || 0) - (va.count || 0);
        return String(a.성함 || '').localeCompare(String(b.성함 || ''));
      });

      const current = [], past = [];
      rows.forEach(c => {
        const yrs = getCustYears(c.고객ID);
        if (yrs.has(curYY)) current.push(c); else past.push(c);
      });

      document.getElementById('pastCount').textContent = past.length ? ` (${past.length}명)` : '';

      function buildCardHtml(c, meta) {
        const yrs = getCustYears(c.고객ID);
        const yrTags = [...[...yrs].sort()].map(yy => `<span class="badge b-${yy}">${yy}년</span>`).join('');
        const statusBadge = custHasIssue(c) ? '<span class="badge b-issue">⚠ 이슈</span>' : '<span class="badge b-done">✓ 정상</span>';
        const custId = String(c.고객ID || '').trim();
        const custAppts = custId ? (db.APPT || [])
          .filter(a => {
            const aId = String(a.고객ID || '').trim();
            if (!aId || aId !== custId) return false;
            return !!getApptDate(a);
          })
          .sort((a, b) => (normalizeDate(b.예약일자 || b.예약일) || '').localeCompare(normalizeDate(a.예약일자 || a.예약일) || ''))
          .slice(0, 3) : [];
        const apptRows = custAppts.length
          ? custAppts.map(a => `<div class="visit-row"><span>${compactDisplay(a.예약일자 || a.예약일)}</span><span style="color:var(--sub)">${esc(a.시술항목 || '-')}</span><span class="badge ${String(a.상태 || '') === '완료' ? 'b-done' : 'b-open'}" style="font-size:9px;">${esc(a.상태 || '예약')}</span></div>`).join('')
          : '<div style="color:var(--sub);font-size:11px;padding:4px 0;">예약 이력 없음</div>';

        return `
        <div class="cust-card">
          <div class="cust-card-header" onclick="toggleCustCard(this)">
            <div class="avatar">${esc(initials(c.성함))}</div>
            <div style="min-width:0;flex:1;">
              <div class="item-title">${esc(c.성함 || '-')}</div>
              <div class="item-sub">${esc(c.연락처 || '-')} · 방문 ${compactDisplay(c.방문일 || c.예약일 || meta.last || '')} · ${meta.count}회</div>
              <div class="cust-year-tags">${yrTags}</div>
            </div>
            <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
              ${statusBadge}
              <span style="font-size:10px;color:var(--sub);">${esc(c.고객ID || '')}</span>
            </div>
          </div>
          <div class="cust-card-body">
            <div class="visit-history">
              <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;letter-spacing:.4px;">최근 예약 이력</div>
              ${apptRows}
            </div>
            <div style="display:flex;gap:8px;margin-top:10px;">
              <button class="btn btn-ghost btn-sm" onclick="openCustomerDetail('${esc(c.고객ID || '')}');event.stopPropagation();">상세 보기</button>
              <button class="btn btn-primary btn-sm" onclick="openSheet('appt_with_cust','${esc(c.고객ID || '')}');event.stopPropagation();">예약 등록</button>
            </div>
          </div>
        </div>
      `;
      }

      const toHtml = (arr) => arr.length
        ? arr.map(c => buildCardHtml(c, visitMap[String(c.고객ID || '')] || { count: 0, last: '', sum: 0 })).join('')
        : '<div class="empty-state"><div class="empty-icon">👤</div>해당 조건의 고객이 없습니다.</div>';

      document.getElementById('custListCurrent').innerHTML = toHtml(current);
      document.getElementById('custListPast').innerHTML = toHtml(past);
    }

    function toggleCustCard(header) {
      const body = header.nextElementSibling;
      if (!body) return;
      body.classList.toggle('open');
    }

    /* ──────────────── Sales ──────────────── */
    function changeSalesMonth(delta) {
      salesCalCursor = new Date(salesCalCursor.getFullYear(), salesCalCursor.getMonth() + delta, 1);
      renderSales();
    }
    function selectSalesDate(iso) { selectedSalesDate = iso; renderSales(); }

    function renderSalesCalendar() {
      const y = salesCalCursor.getFullYear(), m = salesCalCursor.getMonth();
      const titleEl = document.getElementById('salesCalTitle');
      if (titleEl) titleEl.textContent = `${y}년 ${m + 1}월`;

      const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m + 1, 0).getDate();
      let html = WD.map(d => `<div class="cal-day-label">${d}</div>`).join('');
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

      for (let d = 1; d <= lastDate; d++) {
        const iso = y + '-' + pad(m + 1) + '-' + pad(d);
        const daySales = (db.SALES || []).filter(s => normalizeDate(s.일자) === iso);
        const count = daySales.length;
        const dayTotal = daySales.reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
        let cls = 'cal-cell';
        if (count > 0) cls += ' has-appt';
        if (iso === selectedSalesDate) cls += ' selected';
        if (iso === db.today) cls += ' today';
        const dots = count > 0 ? new Array(Math.min(count, 3)).fill('<span class="dot"></span>').join('') : '';
        const amtLabel = count > 0 ? `<span style="font-size:8px;font-weight:700;color:inherit;opacity:.8;">${dayTotal >= 10000 ? (dayTotal/10000).toFixed(0)+'만' : ''}</span>` : '';
        html += `<button class="${cls}" onclick="selectSalesDate('${iso}')"><div>${d}</div><div class="dots">${dots}</div>${amtLabel}</button>`;
      }
      const calEl = document.getElementById('salesCalendar');
      if (calEl) calEl.innerHTML = html;
    }

    function renderSalesDayPanel() {
      const labelEl = document.getElementById('salesDayLabel');
      const summaryEl = document.getElementById('salesDaySummary');
      const listEl = document.getElementById('salesDayList');
      if (!labelEl || !summaryEl || !listEl) return;

      if (!selectedSalesDate) {
        labelEl.textContent = '날짜를 선택하세요';
        summaryEl.innerHTML = '';
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div>캘린더에서 날짜를 선택하면<br>해당일 매출을 확인할 수 있습니다.</div>';
        return;
      }

      const sd = new Date(selectedSalesDate + 'T00:00:00');
      const yy = String(sd.getFullYear()).slice(2);
      const mm = pad(sd.getMonth() + 1);
      const dd = pad(sd.getDate());
      const wdStr = WD[sd.getDay()];
      labelEl.textContent = `${yy}-${mm}-${dd}(${wdStr}) 매출 현황`;

      const rows = (db.SALES || []).filter(s => normalizeDate(s.일자) === selectedSalesDate);
      const dayTotal = rows.reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
      const payGroups = rows.reduce((acc, r) => { const k = String(r.결제수단 || '기타'); acc[k] = (acc[k] || 0) + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0); return acc; }, {});
      const payColors = { '카드': '#b8892a', '계좌이체': '#4a90e2', '현금': '#2cb67d' };

      summaryEl.innerHTML = rows.length ? `
        <div style="background:var(--gold-soft);border:1px solid var(--gold-border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-size:12px;color:var(--sub);font-weight:700;">종합 매출</span>
            <span style="font-size:20px;font-weight:700;color:var(--gold);">${money(dayTotal)}</span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${Object.entries(payGroups).map(([k, v]) => `<span style="background:white;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:${payColors[k]||'var(--sub)'};">${k} ${money(v)}</span>`).join('')}
            <span style="background:white;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--sub);">${rows.length}건</span>
          </div>
        </div>` : '';

      listEl.innerHTML = rows.length
        ? rows.map(s => {
          const net = Number(s.실결제금액 || 0) - Number(s.환불금액 || 0);
          return `<div class="item"><div class="item-inner"><div class="item-title">${esc(s.시술항목 || '-')}</div><div class="item-sub">${esc(getCustName(s.고객ID))} · ${esc(s.결제수단 || '-')}</div></div><div class="item-right"><div class="item-amt">${money(net)}</div><button class="btn btn-ghost btn-xs" style="margin-top:4px;" onclick="event.stopPropagation();openSaleEdit('${esc(s.매출ID || '')}')">✏️ 수정</button></div></div>`;
        }).join('')
        : '<div class="empty-state"><div class="empty-icon">💴</div>해당일 매출 기록이 없습니다.</div>';
    }

    function renderSales() {
      renderSalesCalendar();
      renderSalesDayPanel();

      const salesMonthKey = salesCalCursor.getFullYear() + '-' + pad(salesCalCursor.getMonth() + 1);
      const rows = (db.SALES || []).filter(s => normalizeDate(s.일자).startsWith(salesMonthKey));
      const total = rows.reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
      const avg = rows.length ? Math.round(total / rows.length) : 0;
      document.getElementById('salesTotal').textContent = money(total);
      document.getElementById('salesAvg').textContent = money(avg);

      const grouped = rows.reduce((acc, r) => { const k = String(r.결제수단 || '기타'); acc[k] = (acc[k] || 0) + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0); return acc; }, {});
      const maxV = Math.max(1, ...Object.values(grouped));
      const payColors = { '카드': '#b8892a', '계좌이체': '#4a90e2', '현금': '#2cb67d' };

      document.getElementById('paySummary').innerHTML = Object.keys(grouped).length
        ? Object.entries(grouped).map(([k, v]) => {
          const color = payColors[k] || '#9a8d7c';
          return `<div class="pay-row"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--sub)">${esc(k)}</span><b>${money(v)}</b></div><div class="pay-bar-wrap"><div class="pay-bar-fill" style="width:${Math.round(v / maxV * 100)}%;background:${color};"></div></div></div>`;
        }).join('')
        : '<div class="item-sub">이번 달 매출 데이터가 없습니다.</div>';

      /* [FIX-BUG-07] empty state 메시지 동적화
       * 원인: "이번 달" 고정 텍스트 — 다른 달 조회 시 혼란 유발
       * 수정: salesCalCursor 기준 년/월 동적 표시 */
      const salesMonthLabel = salesCalCursor.getFullYear() + '년 ' + (salesCalCursor.getMonth() + 1) + '월';
      document.getElementById('salesList').innerHTML = rows.length
        ? rows.map(s => {
          const net = Number(s.실결제금액 || 0) - Number(s.환불금액 || 0);
          return `<div class="item"><div class="item-inner"><div class="item-title">${esc(s.시술항목 || '-')}</div><div class="item-sub">${compactDisplay(s.일자)} · ${esc(getCustName(s.고객ID))} · ${esc(s.결제수단 || '-')}</div></div><div class="item-right"><div class="item-amt">${money(net)}</div><button class="btn btn-ghost btn-xs" style="margin-top:4px;" onclick="event.stopPropagation();openSaleEdit('${esc(s.매출ID || '')}')">✏️ 수정</button></div></div>`;
        }).join('')
        : `<div class="empty-state"><div class="empty-icon">💴</div>${esc(salesMonthLabel)} 매출 기록이 없습니다.</div>`;
    }

    /* ──────────────── Expenses ──────────────── */
    function renderExp() {
      const rows = (db.EXPENSE || []).filter(e => normalizeDate(e.일자).startsWith(db.monthKey));
      document.getElementById('expTotal').textContent = money(rows.reduce((s, r) => s + Number(r.금액 || 0), 0));
      document.getElementById('expCount').textContent = rows.length + '건';

      const grouped = rows.reduce((acc, r) => { const k = String(r.계정과목 || r.항목 || '기타'); acc[k] = (acc[k] || 0) + Number(r.금액 || 0); return acc; }, {});
      destroyChart(expChart);
      if (chartReady('expChart')) {
        expChart = new Chart(document.getElementById('expChart'), {
          type: 'doughnut',
          data: { labels: Object.keys(grouped), datasets: [{ data: Object.values(grouped), backgroundColor: ['#b8892a', '#d4a843', '#2cb67d', '#4a90e2', '#e87040', '#9a8d7c'] }] },
          options: { plugins: { legend: { position: 'bottom', labels: { color: '#8c8374', boxWidth: 10, font: { size: 10 } } } } }
        });
      }

      document.getElementById('expList').innerHTML = rows.length
        ? rows.map(e => `<div class="item" onclick="openExpenseDetail('${esc(e.지출ID || '')}')"><div class="item-inner"><div class="item-title">${esc(e.계정과목 || e.항목 || '-')}</div><div class="item-sub">${compactDisplay(e.일자)} · ${esc(e.거래처 || '-')} · ${esc(e.구분 || '-')}</div></div><div class="item-right"><div class="item-amt">${money(e.금액)}</div></div></div>`).join('')
        : '<div class="empty-state"><div class="empty-icon">📋</div>이번 달 지출 기록이 없습니다.</div>';
    }

        <div class="form-row">

          <div class="form-block"><label class="label">기타 구분명</label><input id="fExpTypeOther" class="field" placeholder="기타 선택 시 입력" style="display:none"></div>

        <div class="sheet-footer">
          <button class="btn btn-ghost" onclick="closeSheet()">취소</button>
          <button class="btn btn-primary" onclick="saveExpense()">💾 지출 저장</button>
        </div>`;

    }

    function closeSheet() { document.getElementById('overlay').style.display = 'none'; }

    /* ──────────────── Sheet UI helpers ──────────────── */
    function refreshApptCustInfo() {
      const sel = document.getElementById('fApptCust');
      const box = document.getElementById('apptCustInfo');
      if (!sel || !box) return;
      const id = sel.value;
      if (!id) { box.style.display = 'none'; return; }
      refreshApptCustInfoById(id);
    }
    function refreshApptCustInfoById(id) {
      const box = document.getElementById('apptCustInfo');
      if (!box) return;
      const c = getCustById(id);
      if (!c) { box.style.display = 'none'; return; }
      const yrs = [...getCustYears(id)].sort();
      const tags = yrs.map(yy => `<span class="badge b-${yy}" style="font-size:10px;">${yy}년 방문</span>`).join(' ');
      const sales = (db.SALES || []).filter(s => String(s.고객ID || '') === id);
      box.style.display = 'block';
      box.innerHTML = `<strong>${esc(c.성함 || '-')}</strong> · ${esc(c.연락처 || '-')}<br>누적 ${sales.length}회 방문 · ${tags || '방문 기록 없음'}`;
    }

    function toggleSaleManual() {
      const amt = document.getElementById('fSaleAmt');
      const manual = document.getElementById('fSaleManualCheck') && document.getElementById('fSaleManualCheck').checked;
      if (amt) amt.readOnly = !manual;
      if (!manual) syncServiceSelection('saleService');
    }

    function refreshSaleTargets() {
      const date = normalizeDate((document.getElementById('fSaleDate') || {}).value || db.today);
      const sel = document.getElementById('fSaleCust');
      const box = document.getElementById('saleTargetInfo');
      if (!sel || !box) return;

      const appts = (db.APPT || []).filter(a => getApptDate(a) === date);
      const seen = new Set();
      const uniqueAppts = [];
      /* [FIX-BUG-08] 고객ID 없는 예약 필터링
       * 원인: 고객ID가 없는 예약도 목록에 포함 → 빈 option 혹은 성함만 있는 항목 표시
       * 증상: 매출 입력 시 "고객 선택" 드롭다운에 의미없는 빈 항목 노출
       * 수정: 고객ID가 있는 예약만 uniqueAppts에 포함, 고객ID 없는 예약은 성함으로 표시 */
      appts.forEach(a => {
        const id = String(a.고객ID || '').trim();
        /* 고객ID가 있는 예약: ID 기준 dedup */
        if (id) {
          if (!seen.has(id)) { seen.add(id); uniqueAppts.push(a); }
        } else if (String(a.성함 || '').trim()) {
          /* 고객ID 없지만 성함이 있는 예약: 성함 기준 dedup (신규 예약) */
          const nameKey = '__name__' + String(a.성함 || '').trim();
          if (!seen.has(nameKey)) { seen.add(nameKey); uniqueAppts.push(a); }
        }
        /* 고객ID도 성함도 없는 예약은 제외 */
      });

      const opts = uniqueAppts.map(a => {
        /* [FIX-BUG-08] 고객ID 없는 예약: value='' 대신 성함 표시 처리 */
        const custId = String(a.고객ID || '').trim();
        const c = custId ? getCustById(custId) : null;
        const nameLabel = c && c.성함 ? c.성함 : (String(a.성함 || '').trim() || custId || '미등록 고객');
        const label = nameLabel + ' · ' + (a.예약시간 || '-');
        if (!custId) {
          /* 고객ID 없는 예약: disabled 처리 (매출 연결 불가) */
          return `<option value="" disabled>${esc(label)} (고객ID 없음)</option>`;
        }
        return `<option value="${esc(custId)}">${esc(label)}</option>`;
      });

      const seenAll = new Set(uniqueAppts.map(a => String(a.고객ID || '')));
      const allCusts = (db.CUSTOMER || []).filter(c => !seenAll.has(String(c.고객ID || ''))).map(c => `<option value="${esc(c.고객ID)}">${esc(c.성함 || '-')} (${esc(c.연락처 || '-')})</option>`);
      const sep = allCusts.length ? `<option disabled>── 전체 고객 ──</option>` : '';
      sel.innerHTML = '<option value="">고객 선택</option>' + opts.join('') + sep + allCusts.join('');

      box.innerHTML = uniqueAppts.length
        ? `📅 ${compactDisplay(date)} 예약 고객 ${uniqueAppts.length}명 (상단 우선 표시)`
        : `${compactDisplay(date)} 예약 고객 없음. 전체 고객 목록에서 선택 가능합니다.`;
    }

    function toggleExpOther() {
      const t = document.getElementById('fExpType'), o = document.getElementById('fExpTypeOther');
      if (t && o) o.style.display = t.value === '기타' ? 'block' : 'none';
    }

    /* ──────────────── Detail sheets ──────────────── */
    function openCustomerDetail(id) {
      const c = getCustById(id);
      if (!c) return;
      const sales = (db.SALES || []).filter(s => String(s.고객ID || '') === String(id || ''));
      const visitCount = sales.length;
      const lastSalesDate = sales.reduce((max, r) => { const d = normalizeDate(r.일자); return (d && (!max || d > max)) ? d : max; }, '');
      const lastVisit = lastSalesDate || normalizeDate(c.방문일 || c.예약일 || '');
      const total = sales.reduce((s, r) => s + Number(r.실결제금액 || 0) - Number(r.환불금액 || 0), 0);
      const yrs = [...getCustYears(id)].sort();
      const yrTags = yrs.map(yy => `<span class="badge b-${yy}">${yy}년</span>`).join(' ');

      document.getElementById('sheetBody').innerHTML = `
      <div class="sheet-title">${esc(c.성함 || '-')}</div>
      <div class="sheet-sub">${esc(c.고객ID || '')} · ${yrTags}</div>
      <div class="detail-grid">
        <div class="detail-box"><div class="detail-label">성명</div><div class="detail-value">${esc(c.성함 || '-')}</div></div>
        <div class="detail-box"><div class="detail-label">연락처</div><div class="detail-value">${esc(c.연락처 || '-')}</div></div>
        <div class="detail-box"><div class="detail-label">방문일</div><div class="detail-value">${compactDisplay(c.방문일 || c.예약일 || '-')}</div></div>
        <div class="detail-box"><div class="detail-label">리터치일</div><div class="detail-value">${compactDisplay(c.리터치일 || '-')}</div></div>
        <div class="detail-box"><div class="detail-label">시술항목</div><div class="detail-value">${esc(c.시술항목 || '-')}</div></div>
        <div class="detail-box"><div class="detail-label">동의서</div><div class="detail-value">${custConsent(c) ? '✓ 동의' : '✗ 미동의'}</div></div>
        <div class="detail-box"><div class="detail-label">시술이슈</div><div class="detail-value">${custIssueFlag(c) ? '⚠ 있음' : '없음'}</div></div>

    function saveCustomerEdit(id) {
      const name  = (document.getElementById('eCustName')  || { value: '' }).value.trim();
      const phone = (document.getElementById('eCustPhone') || { value: '' }).value.trim();
      const p = {
        id, name, phone,
        visitDate:   document.getElementById('eCustVisit').value,
        retouchDate: document.getElementById('eCustRetouch').value,
        service:     document.getElementById('eCustService').value,
        consent:     document.getElementById('eCustConsent').value,
        issue:       document.getElementById('eCustIssueFlag').checked ? 'Y' : 'N',
        note:        document.getElementById('eCustNote').value.trim()
      };
      if (!p.name || !p.phone) { alert('성명과 연락처는 필수입니다.'); return; }
      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('수정 저장 중...');
        callServer('api_updateCustomer', p, () => {
          const idx = (db.CUSTOMER || []).findIndex(c => String(c.고객ID || '') === String(id));
          if (idx >= 0) {
            const c = db.CUSTOMER[idx];
            if (p.name)        c.성함 = p.name;
            if (p.phone)       c.연락처 = p.phone;
            if (p.visitDate)   { c.방문일 = p.visitDate; c.예약일 = p.visitDate; }
            if (p.retouchDate) c.리터치일 = p.retouchDate;
            if (p.service)     c.시술항목 = p.service;
            c.동의서동의 = p.consent;
            c['시술이슈'] = p.issue;
            c['시술이슈체크'] = p.issue;
            c.특이사항 = p.note;
            c.메모 = p.note;
          }
          done();
          toast('✓ 수정 완료');
          openCustomerDetail(id);
          renderCust();
        }, e => { done(); alert(err2str(e)); });
      });
    }

    function openExpenseDetail(id) {

      if (!e) return;
      const fields = [['지출ID', e.지출ID], ['일자', compactDisplay(e.일자)], ['구분', e.구분], ['계정과목', e.계정과목 || e.항목], ['거래처', e.거래처], ['금액', money(e.금액)], ['결제수단', e.결제수단], ['증빙유형', e.증빙유형], ['증빙번호', e.증빙번호], ['등록일시', e.등록일시]];
      /* [FIX-BUG-09] href XSS 방지
       * 원인: e.증빙링크를 href에 그대로 사용 — javascript:alert() 등 악성 링크 가능
       * 증상: 증빙링크 컬럼에 javascript: 입력 시 XSS 실행 위험
       * 수정: http:// 또는 https:// 로 시작하는 링크만 허용 */
      const rawLink = String(e.증빙링크 || '').trim();
      const safeLink = /^https?:\/\//i.test(rawLink) ? rawLink : '';
      const linkHtml = safeLink
        ? `<a href="${esc(safeLink)}" target="_blank" rel="noopener noreferrer" style="color:#4a90e2;">열기 →</a>`

      <div class="sheet-title">지출 상세</div>
      <div class="sheet-sub">${esc(e.계정과목 || e.항목 || '-')}</div>
      <div class="detail-grid">
        ${fields.map(([l, v]) => `<div class="detail-box"><div class="detail-label">${esc(l)}</div><div class="detail-value">${esc(v || '-')}</div></div>`).join('')}

      </div>
      <div class="sheet-footer"><button class="btn btn-ghost" onclick="closeSheet()">닫기</button></div>`;
      document.getElementById('overlay').style.display = 'flex';
    }

    /* ──────────────── Save functions ──────────────── */
    function saveCustomer() {

      const apptIdEl = document.getElementById('fCustApptId');
      const p = {
        name: document.getElementById('fCustName').value.trim(),
        phone: document.getElementById('fCustPhone').value.trim(),
        reserveDate: reserve, visitDate: reserve,
        retouchDate: document.getElementById('fCustRetouch').value,

        note: document.getElementById('fCustNote').value.trim(),
        apptId: apptIdEl ? apptIdEl.value : ''
      };
      if (!p.name || !p.phone) { alert('성명과 연락처는 필수입니다.'); return; }
      if (!p.visitDate) { alert('방문일 / 예약일을 반드시 입력해주세요.\n(과거 고객은 실제 방문일을 선택하세요.)'); return; }

      });
    }

      /* [FIX-H2] 예약일 유효성 검사 추가
       * 원인: date 필드 검증 없음 → 날짜 지운 채 저장 시 예약일='' 레코드 생성
       * 증상: 달력에 표시되지 않는 유령 예약 생성
       * 수정: date 비어있으면 저장 차단 */
      const date = (document.getElementById('fApptDate') || {}).value || '';
      if (!date) { alert('예약일을 선택해주세요.'); return; }

      /* [FIX-H2] custName fallback에서 fApptCust(고객ID) 제거
       * 원인: fApptName이 비어있으면 hidden fApptCust(= 'C0001')가 custName으로 전달됨
       * 증상: GAS가 custName='C0001'을 성함으로 시트에 기록
       * 수정: fApptName.value만 사용, 없으면 빈 문자열 */
      const custName = (document.getElementById('fApptName') || {}).value || '';
      const custPhone = (document.getElementById('fApptPhone') || {}).value || '';
      const p = {

        time: document.getElementById('fApptTime').value,

        custName: custName.trim(),

        note: (document.getElementById('fApptNote') || {}).value || ''
      };

      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('예약 저장 중...');
        callServer('api_createAppointment', p, () => { done(); closeSheet(); toast('✓ 예약 등록 완료'); refreshFromServer(); }, e => { done(); alert(err2str(e)); });

      const a = (db.APPT || []).find(r => String(r.예약ID || '') === String(apptId || ''));
      if (!a) { alert('예약 정보를 찾을 수 없습니다.'); return; }
      if (!String(a.고객ID || '').trim()) {
        alert('신규 고객은 [완료 + 고객카드]로 처리해주세요.\n고객ID 없이 완료 처리하면 매출 연결이 누락될 수 있습니다.');
        return;
      }
      /* [FIX-H6] 환불 금액 필드 연동
       * fCompleteRefund 추가 (openComplete에서 추가된 필드) */
      const p = {
        apptId, customerId: a.고객ID, service: a.시술항목,
        paid: document.getElementById('fCompleteAmt').value,
        refund: (document.getElementById('fCompleteRefund') || {}).value || '0',
        payMethod: document.getElementById('fCompletePay').value,
        date: getApptDate(a) || db.today
      };
      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('완료 처리 중...');
        callServer('api_completeAppointment', p, () => { done(); closeSheet(); toast('✓ 완료 처리되었습니다.'); refreshFromServer(); }, e => { done(); alert(err2str(e)); });
      });
    }

    /* [FIX-H6] 완료 + 고객카드: 환불 필드 연동 */
    function saveCompleteAndRegister(apptId, custName, custPhone) {
      const a = (db.APPT || []).find(r => String(r.예약ID || '') === String(apptId || ''));
      if (!a) { alert('예약 정보를 찾을 수 없습니다.'); return; }
      /* [FIX-BUG-15] a.연락처 안전 처리
       * 원인: APPT 객체에 '연락처' 키가 없을 수 있음 → undefined가 전달됨
       * 수정: custPhone 인자 우선, 없으면 a.연락처, 그것도 없으면 빈 문자열 */
      const safePhone = custPhone || String(a.연락처 || '').trim();
      const p = {
        apptId, customerId: a.고객ID || '', service: a.시술항목 || '',
        paid: document.getElementById('fCompleteAmt').value,
        refund: (document.getElementById('fCompleteRefund') || {}).value || '0',
        payMethod: document.getElementById('fCompletePay').value,
        date: getApptDate(a) || db.today
      };
      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('완료 처리 중...');
        callServer('api_completeAppointment', p, () => {
          done();
          closeSheet();
          /* [FIX-BUG-15] safePhone 사용 */
          openSheet('cust', { name: custName, phone: safePhone, apptId: apptId });
          toast('✓ 완료! 고객 카드를 작성해주세요.');
          refreshFromServer();
        }, e => { done(); alert(err2str(e)); });

    }

     * 원인: GAS api_updateSale의 fieldMap에 '시술항목' 포함되어 있으나 UI에 노출 없음
