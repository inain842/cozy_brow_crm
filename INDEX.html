      const s = (db.SALES || []).find(r => String(r.매출ID || '') === String(id || ''));
      if (!s) return;
      const payOpts = ['카드', '계좌이체', '현금'].map(v =>
        '<option value="' + v + '" ' + (s.결제수단 === v ? 'selected' : '') + '>' + v + '</option>').join('');
      /* 시술항목 select — 현재 값이 카탈로그에 없어도 직접 입력 option 추가 */
      const svcRows = getServiceRows();
      const curSvc = String(s.시술항목 || '');
      const svcOpts = '<option value="">변경 안 함</option>' +
        svcRows.map(r => '<option value="' + esc(r.시술항목) + '" ' + (r.시술항목 === curSvc ? 'selected' : '') + '>' + esc(r.시술항목) + '</option>').join('') +
        (!svcRows.find(r => r.시술항목 === curSvc) && curSvc ? '<option value="' + esc(curSvc) + '" selected>' + esc(curSvc) + '</option>' : '');

      document.getElementById('sheetBody').innerHTML =
        '<div class="sheet-title">매출 수정</div>' +
        '<div class="sheet-sub">' + esc(s.매출ID || '') + ' · ' + esc(s.시술항목 || '-') + '</div>' +
        '<div style="height:14px"></div>' +
        '<div class="form-row">' +
          '<div class="form-block"><label class="label">일자</label><input id="eSaleDate" class="field" type="date" value="' + esc(normalizeDate(s.일자)) + '"></div>' +
          '<div class="form-block"><label class="label">결제 수단</label><select id="eSalePay" class="select">' + payOpts + '</select></div>' +
        '</div>' +
        '<div class="form-block"><label class="label">시술항목</label><select id="eSaleService" class="select">' + svcOpts + '</select></div>' +
        '<div class="form-row">' +
          '<div class="form-block"><label class="label">결제 금액</label><input id="eSaleAmt" class="field" type="number" value="' + Number(s.실결제금액 || 0) + '"></div>' +
          '<div class="form-block"><label class="label">환불 금액</label><input id="eSaleRefund" class="field" type="number" value="' + Number(s.환불금액 || 0) + '"></div>' +
        '</div>' +
        '<div class="form-block"><label class="label">메모</label><textarea id="eSaleNote" class="textarea">' + esc(s.메모 || '') + '</textarea></div>' +
        '<div class="sheet-footer">' +
          '<button class="btn btn-ghost" onclick="closeSheet()">취소</button>' +
          '<button class="btn btn-primary" onclick="saveSaleEdit(\'' + esc(id) + '\')">💾 수정 저장</button>' +
        '</div>';
      document.getElementById('overlay').style.display = 'flex';
    }

    /* [FIX-H7] saveSaleEdit: 시술항목 필드 연동
     * openSaleEdit에서 추가한 eSaleService select 값을 p.service로 전달
     * GAS api_updateSale의 fieldMap.시술항목은 이미 존재 → 서버 수정 불필요 */
    function saveSaleEdit(id) {
      const svcEl = document.getElementById('eSaleService');
      var p = {
        id: id,
        date:      (document.getElementById('eSaleDate') || {}).value,
        payMethod: (document.getElementById('eSalePay') || {}).value,
        paid:      (document.getElementById('eSaleAmt') || {}).value,
        refund:    (document.getElementById('eSaleRefund') || {}).value,
        service:   svcEl && svcEl.value ? svcEl.value : undefined, /* 빈 값이면 미전송 */
        note:      ((document.getElementById('eSaleNote') || {}).value || '').trim()
      };
      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('매출 수정 중...');
        callServer('api_updateSale', p, function() {
          var idx = (db.SALES || []).findIndex(function(r) { return String(r.매출ID || '') === String(id); });
          if (idx >= 0) {
            var s = db.SALES[idx];
            s.일자 = p.date; s.결제수단 = p.payMethod;
            s.실결제금액 = Number(p.paid); s.환불금액 = Number(p.refund); s.메모 = p.note;
            if (p.service) s.시술항목 = p.service;
          }
          done();
          closeSheet(); toast('✓ 매출 수정 완료'); renderSales();
        }, function(e) { done(); alert(err2str(e)); });
      });
    }

    /* ──────────────── 예약 수정 ──────────────── */
    function openApptEdit(apptId) {
      var a = (db.APPT || []).find(function(r) { return String(r.예약ID || '') === String(apptId || ''); });
      if (!a) return;
      var custName = getApptName(a);
      var svcOpts = '<option value="">미정</option>' + getServiceRows().map(function(r) {
        return '<option value="' + esc(r.시술항목) + '" ' + (r.시술항목 === a.시술항목 ? 'selected' : '') + '>' + esc(r.시술항목) + '</option>';
      }).join('');
      document.getElementById('sheetBody').innerHTML =
        '<div class="sheet-title">예약 수정</div>' +
        '<div class="sheet-sub">' + esc(a.예약ID || '') + ' · ' + esc(custName) + '</div>' +
        '<div style="height:14px"></div>' +
        '<div class="form-row">' +
          '<div class="form-block"><label class="label">예약일 *</label><input id="eApptDate" class="field" type="date" value="' + esc(getApptDate(a)) + '"></div>' +
          '<div class="form-block"><label class="label">예약 시간</label><input id="eApptTime" class="field" type="time" value="' + esc(a.예약시간 || '') + '"></div>' +
        '</div>' +
        '<div class="form-block" style="margin-top:8px;"><label class="label">시술 항목</label><select id="eApptService" class="select">' + svcOpts + '</select></div>' +
        '<div class="form-block"><label class="label">예상 매출</label><input id="eApptAmt" class="field" type="number" value="' + Number(a.예상매출 || a.예상금액 || 0) + '"></div>' +
        '<div class="form-block"><label class="label">메모</label><textarea id="eApptNote" class="textarea" rows="2">' + esc(a.메모 || a.비고 || '') + '</textarea></div>' +
        '<div class="sheet-footer">' +
          '<button class="btn btn-ghost" onclick="closeSheet()">취소</button>' +
          '<button class="btn btn-primary" onclick="saveApptEdit(\'' + esc(apptId) + '\')">💾 수정 저장</button>' +
        '</div>';
      document.getElementById('overlay').style.display = 'flex';
    }

    function saveApptEdit(apptId) {
      var newDate = (document.getElementById('eApptDate') || {}).value;
      if (!newDate) { alert('예약일을 입력해주세요.'); return; }
      var p = {
        apptId:   apptId,
        date:     newDate,
        time:     (document.getElementById('eApptTime') || {}).value,
        service:  (document.getElementById('eApptService') || {}).value,
        expected: (document.getElementById('eApptAmt') || {}).value,
        note:     ((document.getElementById('eApptNote') || {}).value || '').trim()
      };
      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('예약 수정 중...');
        callServer('api_updateAppointment', p, function() {
          var idx = (db.APPT || []).findIndex(function(r) { return String(r.예약ID || '') === String(apptId); });
          if (idx >= 0) {
            var a = db.APPT[idx];
            a.예약일자 = p.date; a.예약시간 = p.time;
            if (p.service) a.시술항목 = p.service;
            a.예상매출 = Number(p.expected); a.메모 = p.note;
          }
          done();
          closeSheet(); toast('✓ 예약 수정 완료'); renderAppt(); renderDash();
        }, function(e) { done(); alert(err2str(e)); });
      });
    }

    function bulkResolveIssues() {
      const base = (db.CUSTOMER || []).filter(c => custHasIssue(c));
      const ids = base.map(c => String(c.고객ID || '')).filter(Boolean);
      if (!ids.length) { alert('해소할 이슈 고객이 없습니다.'); return; }
      if (!confirm(`이슈 고객 ${ids.length}명 동의서 일괄 처리할까요?`)) return;
      /* [FIX-H9] 중복 제출 방지 */
      _withSave(function(done) {
        toast('일괄 처리 중...');
        callServer('api_bulkResolveCustomerIssues', { ids: ids }, () => { done(); toast('✓ 이슈 일괄 해소 완료'); refreshFromServer(); }, e => { done(); alert(err2str(e)); });
      });
    }

    /* ──────────────── Error handlers ──────────────── */
    window.addEventListener('error', e => { console.error(e); hideSplash(); });
    window.addEventListener('unhandledrejection', e => { console.error(e); hideSplash(); });
    window.addEventListener('load', boot);
  </script>
</body>

</html>
